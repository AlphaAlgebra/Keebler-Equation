name: Upload Keebler Proof
on: [push]

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Upload Masterpiece and Certificate
        uses: actions/upload-artifact@v3
        with:
          name: Keebler-Validated-Files
          path: |
            Gold_Masterpiece.html
            J_KEEBLER_CERTIFICATE.txt
          retention-days: 90
